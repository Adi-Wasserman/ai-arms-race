name: Deploy to GitHub Pages

on:
  # Deploy on every push to main.
  push:
    branches: [main]

  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Minimum permissions needed for the official Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages build at a time — cancel any queued run so the latest
# commit always wins, but don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
